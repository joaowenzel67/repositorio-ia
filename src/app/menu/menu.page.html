<ion-header>
  <ion-toolbar>
    <ion-title>Menu Principal</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="menu-container animate-fade-in">

    <!-- Cabeçalho de boas-vindas -->
    <div class="welcome-section">
      <div class="welcome-avatar">
        <ion-icon name="person-circle-outline"></ion-icon>
      </div>
      <h2>Bem-vindo!</h2>
      <p>Selecione uma opção para continuar</p>
    </div>

    <!-- Grid de opções do menu -->
    <div class="menu-grid">
      <div
        class="menu-card"
        *ngFor="let item of menuItems; let i = index"
        (click)="navigateTo(item.route)"
        [style.animation-delay]="(i * 0.08) + 's'"
        id="menu-{{item.route.replace('/', '')}}">
        <div class="card-icon" [style.background]="item.color + '15'">
          <ion-icon [name]="item.icon" [style.color]="item.color"></ion-icon>
        </div>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </div>
    </div>

    <!-- Botão Sair -->
    <ion-button
      expand="block"
      color="medium"
      fill="outline"
      (click)="sair()"
      class="btn-sair"
      id="btn-sair">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Sair do Sistema
    </ion-button>

  </div>
</ion-content>
