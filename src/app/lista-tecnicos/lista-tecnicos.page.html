<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Técnicos</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/cadastro-tecnico" id="btn-novo-tecnico">
        <ion-icon name="add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="list-container animate-fade-in">

    <!-- Contagem -->
    <div class="list-count" *ngIf="tecnicos.length > 0">
      <ion-icon name="people-outline"></ion-icon>
      <span>{{ tecnicos.length }} técnico(s) cadastrado(s)</span>
    </div>

    <!-- Lista vazia -->
    <div class="empty-state" *ngIf="tecnicos.length === 0">
      <ion-icon name="people-outline"></ion-icon>
      <h3>Nenhum técnico cadastrado</h3>
      <p>Clique no botão + para cadastrar um novo técnico</p>
    </div>

    <!-- Lista de técnicos -->
    <div class="tecnico-card" *ngFor="let tecnico of tecnicos">
      <div class="card-avatar" [ngClass]="tecnico.situacao === 'Ativo' ? 'ativo' : 'inativo'">
        <ion-icon name="person-outline"></ion-icon>
      </div>

      <div class="card-content">
        <div class="card-top-row">
          <h3>{{ tecnico.nome }}</h3>
          <span class="badge-situacao" [ngClass]="tecnico.situacao === 'Ativo' ? 'ativo' : 'inativo'">
            {{ tecnico.situacao }}
          </span>
        </div>

        <div class="card-details">
          <div class="detail-item">
            <ion-icon name="construct-outline"></ion-icon>
            <span>{{ tecnico.especialidade }}</span>
          </div>
          <div class="detail-item">
            <ion-icon name="mail-outline"></ion-icon>
            <span>{{ tecnico.contato }}</span>
          </div>
        </div>
      </div>

      <ion-button fill="clear" color="danger" size="small" (click)="excluirTecnico(tecnico.id)" class="btn-delete" id="btn-excluir-tecnico-{{tecnico.id}}">
        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

  </div>
</ion-content>
