<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Chamados</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/cadastro-chamado" id="btn-novo-chamado">
        <ion-icon name="add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="list-container animate-fade-in">

    <!-- Contagem -->
    <div class="list-count" *ngIf="chamados.length > 0">
      <ion-icon name="document-text-outline"></ion-icon>
      <span>{{ chamados.length }} chamado(s) encontrado(s)</span>
    </div>

    <!-- Lista vazia -->
    <div class="empty-state" *ngIf="chamados.length === 0">
      <ion-icon name="folder-open-outline"></ion-icon>
      <h3>Nenhum chamado cadastrado</h3>
      <p>Clique no botão + para cadastrar um novo chamado</p>
    </div>

    <!-- Lista de chamados -->
    <div class="chamado-card" *ngFor="let chamado of chamados" (click)="verDetalhes(chamado.id)">
      <div class="card-top">
        <div class="card-id">#{{ chamado.id }}</div>
        <span class="badge-prioridade" [ngClass]="getClassePrioridade(chamado.prioridade)">
          {{ chamado.prioridade }}
        </span>
      </div>

      <h3 class="card-title">{{ chamado.titulo }}</h3>

      <div class="card-info">
        <div class="info-item">
          <ion-icon name="person-outline"></ion-icon>
          <span>{{ chamado.solicitante }}</span>
        </div>
        <div class="info-item">
          <ion-icon name="build-outline"></ion-icon>
          <span>{{ chamado.tecnico }}</span>
        </div>
      </div>

      <div class="card-bottom">
        <span class="badge-status" [ngClass]="getClasseStatus(chamado.status)">
          {{ chamado.status }}
        </span>
        <ion-button fill="clear" color="danger" size="small" (click)="excluirChamado(chamado.id); $event.stopPropagation()" id="btn-excluir-{{chamado.id}}">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </div>
    </div>

  </div>
</ion-content>
